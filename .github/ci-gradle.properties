# CI-only Gradle overrides. The workflow copies this into ~/.gradle/gradle.properties,
# which takes precedence over the project's gradle.properties — so these settings apply
# on CI only and leave local builds untouched.
# No Gradle daemon on ephemeral runners: it can't be reused across jobs and only costs memory.
org.gradle.daemon=false
# Cap parallel workers to keep memory in check on the standard 4-vCPU / 16 GB runner.
org.gradle.workers.max=2
# Each CI run is a fresh checkout, so incremental compilation only adds overhead.
kotlin.incremental=false
